<div class="ts-card p-5">
  <p class="text-base font-semibold">OpenTherm</p>
  <p class="text-xs text-ts-muted mt-1">Live read-only values reported by the boiler.</p>
  <div class="mt-4 overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="text-ts-muted text-left">
        <tr>
          <th class="py-2 font-medium">Field</th>
          <th class="py-2 font-medium">Value</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-ts-border/40">
        <template x-for="row in otRows()" :key="row.label">
          <tr>
            <td class="py-2 pr-4 text-slate-200" x-text="row.label"></td>
            <td class="py-2 tabular-nums" x-text="row.value"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
